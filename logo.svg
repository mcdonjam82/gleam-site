<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52" width="240" height="52" fill="none" role="img" aria-label="Gleam">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3b90"/>
      <stop offset="50%" stop-color="#07b9fd"/>
      <stop offset="100%" stop-color="#7649ec"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#07b9fd"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: rounded square background -->
  <rect x="2" y="2" width="48" height="48" rx="12" fill="url(#iconGrad)"/>

  <!-- Sparkle / gleam star — centered in icon -->
  <g filter="url(#glow)" transform="translate(26, 26)">
    <!-- Large 4-point star -->
    <path d="M0,-12 L2.5,-2.5 L12,0 L2.5,2.5 L0,12 L-2.5,2.5 L-12,0 L-2.5,-2.5 Z" fill="white"/>
    <!-- Small accent dots -->
    <circle cx="10" cy="-10" r="2" fill="#07b9fd" opacity="0.9"/>
    <circle cx="-10" cy="10" r="1.5" fill="#7649ec" opacity="0.8"/>
  </g>

  <!-- Wordmark: GLEAM -->
  <text
    x="62" y="26"
    dominant-baseline="central"
    font-family="Roboto, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="26"
    font-weight="900"
    letter-spacing="3"
    fill="url(#textGrad)"
  >GLEAM</text>
</svg>
