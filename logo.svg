<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" fill="none" role="img" aria-label="Gleam">
  <defs>

    <!-- G arc gradient: deep blue → cyan (left to right, userSpace coords) -->
    <linearGradient id="wm-grad-g" x1="6" y1="0" x2="34" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1f3b90"/>
      <stop offset="100%" stop-color="#07b9fd"/>
    </linearGradient>

    <!-- Text gradient: blue → cyan -->
    <linearGradient id="wm-grad-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1f3b90"/>
      <stop offset="100%" stop-color="#07b9fd"/>
    </linearGradient>

    <!-- Sparkle glow filter -->
    <filter id="wm-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow on icon -->
    <filter id="wm-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#07b9fd" flood-opacity="0.35"/>
    </filter>

  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ICON MARK                                       -->
  <!-- G: center (20,24), radius 14, opens at ~1 o'clock -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- G arc: start at ~35° (upper-right), sweep 300° counterclockwise to 3 o'clock, then crossbar -->
  <!-- M(28,12.5): point on circle r=14, ~35° from 12 o'clock                                     -->
  <!-- A 14,14 0 1,0 34,24: large arc, counterclockwise to 3 o'clock (34,24)                      -->
  <!-- L 22,24: horizontal crossbar going left                                                      -->
  <g filter="url(#wm-shadow)">
    <path
      d="M 28,12.5 A 14,14 0 1,0 34,24 L 22,24"
      stroke="url(#wm-grad-g)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- 4-pointed sparkle at upper-right of G gap (the "gleam" moment) -->
  <!-- Center (37, 9.8), outer radius 3.8, inner pinch 1.1           -->
  <path
    d="M 37,6 L 38.1,8.7 L 40.8,9.8 L 38.1,10.9 L 37,13.6 L 35.9,10.9 L 33.2,9.8 L 35.9,8.7 Z"
    fill="#07b9fd"
    filter="url(#wm-glow)"
  />

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WORDMARK: GLEAM                                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <text
    x="50" y="24"
    dominant-baseline="central"
    font-family="Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="21"
    font-weight="900"
    letter-spacing="4"
    fill="url(#wm-grad-text)"
  >GLEAM</text>

</svg>
