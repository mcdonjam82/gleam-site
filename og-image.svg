<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b1e"/>
      <stop offset="100%" stop-color="#151327"/>
    </linearGradient>
    <linearGradient id="glow1" cx="30%" cy="20%" r="50%" fx="30%" fy="20%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1f3b90" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1f3b90" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#7649ec" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7649ec" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3b90"/>
      <stop offset="50%" stop-color="#07b9fd"/>
      <stop offset="100%" stop-color="#7649ec"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#07b9fd"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top gradient bar -->
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f3b90"/>
      <stop offset="50%" stop-color="#07b9fd"/>
      <stop offset="100%" stop-color="#7649ec"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="5" fill="url(#topBar)"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="80" height="80" rx="20" fill="url(#iconGrad)"/>
  <g filter="url(#glow)" transform="translate(120, 240)">
    <path d="M0,-22 L4.5,-4.5 L22,0 L4.5,4.5 L0,22 L-4.5,4.5 L-22,0 L-4.5,-4.5 Z" fill="white"/>
    <circle cx="16" cy="-16" r="4" fill="#07b9fd" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="256" font-family="Roboto, Arial, sans-serif" font-size="64" font-weight="900" letter-spacing="6" fill="url(#textGrad)">GLEAM</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="1">AI Review Autopilot for Local Businesses</text>

  <!-- Divider -->
  <rect x="80" y="360" width="200" height="2" fill="url(#topBar)" opacity="0.5"/>

  <!-- Main headline -->
  <text x="80" y="430" font-family="Roboto, Arial, sans-serif" font-size="52" font-weight="900" fill="white">No Review Goes</text>
  <text x="80" y="500" font-family="Roboto, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)">Unanswered. Ever.</text>

  <!-- Right side: floating card mockup -->
  <rect x="720" y="140" width="400" height="200" rx="18" fill="rgba(21,19,39,0.9)" stroke="rgba(7,185,253,0.4)" stroke-width="1.5"/>
  <!-- Stars -->
  <text x="748" y="186" font-family="Arial" font-size="18" fill="#f59e0b">★★★★★</text>
  <text x="748" y="215" font-family="Roboto, Arial, sans-serif" font-size="13" fill="#e2e8f0" font-style="italic">"Best experience I've had — so professional"</text>
  <rect x="748" y="228" width="340" height="1" fill="rgba(7,185,253,0.15)"/>
  <text x="748" y="252" font-family="Roboto, Arial, sans-serif" font-size="12" fill="#94a3b8">💬 "Thank you for the kind words! We're so glad</text>
  <text x="748" y="272" font-family="Roboto, Arial, sans-serif" font-size="12" fill="#94a3b8">you had a great experience. See you soon!"</text>
  <text x="748" y="300" font-family="Roboto, Arial, sans-serif" font-size="11" fill="#07b9fd" font-weight="700">Responded by Gleam · 2 min ago ✓</text>

  <!-- Trial pill -->
  <rect x="720" y="380" width="400" height="52" rx="26" fill="rgba(7,185,253,0.1)" stroke="rgba(7,185,253,0.3)" stroke-width="1.5"/>
  <text x="920" y="412" font-family="Roboto, Arial, sans-serif" font-size="16" font-weight="700" fill="#07b9fd" text-anchor="middle">14-Day Free Trial · gleamreply.com</text>

  <!-- Bottom domain -->
  <text x="80" y="590" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#5e6cd3" letter-spacing="2">gleamreply.com</text>
</svg>
